name: Daily issue

on:
  schedule:
    # 05:30 UTC every day = 00:30 ET / 01:30 EDT. Issue is published at 06:00 ET (10:00 UTC).
    # We run early to give the pipeline ~4 hours of headroom for retries / debugging
    # before the scheduled send fires.
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry mode (no send, no API costs)"
        type: boolean
        default: false

permissions:
  contents: write   # to commit the daily issue audit trail
  issues: write     # for self-improvement loop alerts

concurrency:
  group: daily-issue
  cancel-in-progress: false

jobs:
  publish:
    name: Build, draft, and schedule today's issue
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
      BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
      REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Self-test (dry run)
        run: python -m pipeline.run --selftest

      - name: Run pipeline
        if: ${{ inputs.dry_run != true }}
        run: python -m pipeline.run

      - name: Run pipeline (dry mode, manual)
        if: ${{ inputs.dry_run == true }}
        run: python -m pipeline.run --dry-run

      - name: Commit issue audit
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "dealer-ops-daily-bot"
          git config user.email "bot@dealeropsdaily.com"
          git add issues/
          if git diff --cached --quiet; then
            echo "No issue files changed"
          else
            git commit -m "issue: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Open alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Daily issue pipeline failed — ${new Date().toISOString().slice(0,10)}`,
              labels: ["pipeline-failure", "needs-triage"],
              body: `The daily issue workflow failed at ${new Date().toISOString()}.\n\nLogs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
