    url: https://www.autonews.com/
    rss: https://www.autonews.com/rss-feeds
    weight: 10
    update_frequency: daily
    notes: Tier-1 source. Paywalled article bodies; headlines and dek summaries are in RSS. RSS index page lists multiple topical feeds (retail, F&I, used cars, OEM). Pipeline should pull retail and dealers feeds specifically.

  - name: Automotive News Retail
