  - name: WardsAuto / Automotive Dive
    category: trade_press
    url: https://www.wardsauto.com/
    rss: null
    weight: 8
    update_frequency: daily
    notes: WardsAuto merged with Automotive Dive in October 2025. No public RSS feed found. Use Automotive Dive feed (https://www.automotivedive.com/feeds/news/) which now hosts Wards content, or scrape the homepage.

  - name: Automotive Dive
